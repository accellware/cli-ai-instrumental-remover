name: Docker Image (CPU)

# Builds Dockerfile (debian:trixie + FFmpeg-from-source + CPU-only).
# Pushes to GHCR on pushes to main/master and on tags. PRs build but
# don't push so external contributors aren't blocked on registry creds.

on:
  push:
    branches: [main, master]
    tags: ['v*']
    paths:
      - 'Dockerfile'
      - 'docker/**'
      - 'impl/**'
      - 'models/**'
      - '.github/workflows/docker-cpu.yml'
  pull_request:
    paths:
      - 'Dockerfile'
      - 'docker/**'
      - 'impl/**'
      - '.github/workflows/docker-cpu.yml'
  workflow_dispatch:
    inputs:
      model_name:
        description: 'ONNX model basename to bundle (without .onnx)'
        type: choice
        default: UVR-MDX-NET-Voc_FT
        options:
          - UVR-MDX-NET-Voc_FT
          - UVR_MDXNET_KARA_2
          - UVR-MDX-NET-Inst_HQ_3

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  # Resolution order: workflow_dispatch input → repo variable → hardcoded default.
  MODEL_NAME: ${{ inputs.model_name || vars.MODEL_NAME || 'UVR-MDX-NET-Voc_FT' }}

jobs:
  build:
    name: Build & push (cpu)
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Resolve & validate selected model
        run: |
          echo "Selected model: ${MODEL_NAME}"
          test -f "models/mdxnet/${MODEL_NAME}.onnx" \
            || { echo "::error::models/mdxnet/${MODEL_NAME}.onnx not found"; exit 1; }

      - name: Bake model_path into docker/config.json
        # The Dockerfile does `COPY docker/config.json /app/config.json`, so
        # rewriting the file in the build context selects the model without
        # any Dockerfile change. /app/models/mdxnet is the in-image location.
        run: |
          tmp=$(mktemp)
          jq --arg model "/app/models/mdxnet/${MODEL_NAME}.onnx" \
             '.model_path = $model' \
             docker/config.json > "$tmp"
          mv "$tmp" docker/config.json
          echo "--- docker/config.json after rewrite ---"
          cat docker/config.json

      - uses: docker/setup-buildx-action@v3

      - name: Log in to ${{ env.REGISTRY }}
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # `cpu` flavor + `latest` on default branch.
          flavor: |
            suffix=-cpu,onlatest=true
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build (and push on non-PR)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=docker-cpu
          cache-to:   type=gha,scope=docker-cpu,mode=max
          provenance: false
