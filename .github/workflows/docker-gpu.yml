name: Docker Image (GPU / CUDA)

# Builds Dockerfile.gpu (nvidia/cuda:12.6.3-cudnn-* + FFmpeg-from-source +
# bundled CUDA-enabled ONNX Runtime). The image is large (multi-GB) — CI
# build is ~15-20 min cold, faster with the GHA cache.

on:
  push:
    branches: [main, master]
    tags: ['v*']
    paths:
      - 'Dockerfile.gpu'
      - 'docker/**'
      - 'impl/**'
      - 'models/**'
      - '.github/workflows/docker-gpu.yml'
  pull_request:
    paths:
      - 'Dockerfile.gpu'
      - 'docker/**'
      - 'impl/**'
      - '.github/workflows/docker-gpu.yml'
  workflow_dispatch:
    inputs:
      model_name:
        description: 'ONNX model basename to bundle (without .onnx)'
        type: choice
        default: UVR-MDX-NET-Voc_FT
        options:
          - UVR-MDX-NET-Voc_FT
          - UVR_MDXNET_KARA_2
          - UVR-MDX-NET-Inst_HQ_3

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  # Resolution order: workflow_dispatch input → repo variable → hardcoded default.
  MODEL_NAME: ${{ inputs.model_name || vars.MODEL_NAME || 'UVR-MDX-NET-Voc_FT' }}

jobs:
  build:
    name: Build & push (gpu)
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Resolve & validate selected model
        run: |
          echo "Selected model: ${MODEL_NAME}"
          test -f "models/mdxnet/${MODEL_NAME}.onnx" \
            || { echo "::error::models/mdxnet/${MODEL_NAME}.onnx not found"; exit 1; }

      - name: Bake model_path into docker/config.cuda.json
        # The Dockerfile.gpu does `COPY docker/config.cuda.json /app/config.json`,
        # so rewriting the file in the build context selects the model without
        # any Dockerfile change. /app/models/mdxnet is the in-image location.
        run: |
          tmp=$(mktemp)
          jq --arg model "/app/models/mdxnet/${MODEL_NAME}.onnx" \
             '.model_path = $model' \
             docker/config.cuda.json > "$tmp"
          mv "$tmp" docker/config.cuda.json
          echo "--- docker/config.cuda.json after rewrite ---"
          cat docker/config.cuda.json

      # The GPU build pulls in CUDA, cuDNN, FFmpeg-from-source, rustup, ORT,
      # and the model files. The hosted runner only has ~14 GB free; reclaim
      # space from preinstalled toolchains we don't use.
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /usr/local/.ghcup /opt/hostedtoolcache/CodeQL \
                      /usr/local/share/boost
          sudo docker image prune --all --force || true
          df -h

      - uses: docker/setup-buildx-action@v3

      - name: Log in to ${{ env.REGISTRY }}
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # `gpu` flavor; `latest` is reserved for the CPU image.
          flavor: |
            suffix=-gpu,onlatest=true
            latest=false
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=gpu,enable={{is_default_branch}}

      - name: Build (and push on non-PR)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.gpu
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=docker-gpu
          cache-to:   type=gha,scope=docker-gpu,mode=max
          provenance: false
